<!DOCTYPE html>
<html lang="en">
<head>
<title>Kanban Board</title>
<!--meta tags-->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compability" content="IE=edge" />
  <meta http-equiv="refresh" content="20" />
  <meta name="keywords" content="" />
  <meta name="description" content="" />
  <meta name="author" content="" />


  <!--favicon-->
  <link rel="icon" type="image/X-icon" href="" />
  <!--Font Family-->
  <link rel="stylesheet" href="fonts/Noto Sans-Regular.tff" />
  <!--fontwesome icons-->
  <link rel="stylesheet" href="icons/css/all.css" />
  <link rel="stylesheet" href="icons/css/allmin.css" />
  <!--Stylesheets-->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />

</head>

<body>

<h1 class="title">Kanban Task Board</h1>

<div class="board">

<div class="column">

<h2>📝 To Do <span id="todo-count">0</span></h2>

<div class="task-list" id="todo"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

<input type="text" id="todoInput" placeholder="New task">

<button onclick="addTask('todo')">Add</button>

</div>


<div class="column">

<h2>⏳ In Progress <span id="progress-count">0</span></h2>

<div class="task-list" id="progress"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

<input type="text" id="progressInput" placeholder="New task">

<button onclick="addTask('progress')">Add</button>

</div>


<div class="column">

<h2>✅ Done <span id="done-count">0</span></h2>

<div class="task-list" id="done"
ondrop="drop(event)"
ondragover="allowDrop(event)">
</div>

<input type="text" id="doneInput" placeholder="New task">

<button onclick="addTask('done')">Add</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
